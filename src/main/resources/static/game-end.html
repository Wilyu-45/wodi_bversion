<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谁是卧底 - 游戏结束</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .winner-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 60px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }

        .winner-title {
            font-size: 28px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }

        .winner-name {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .winner-name.civilian {
            color: #4ade80;
        }

        .winner-name.undercover {
            color: #f87171;
        }

        .winner-name.blank {
            color: #fbbf24;
        }

        .players-section {
            margin: 30px 0;
            text-align: left;
        }

        .players-title {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
            text-align: center;
        }

        .player-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .player-item {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .player-item.alive {
            background: rgba(74, 222, 128, 0.2);
            border: 1px solid rgba(74, 222, 128, 0.5);
        }

        .player-item.dead {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
        }

        .player-item .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .player-item.alive .status-dot {
            background: #4ade80;
        }

        .player-item.dead .status-dot {
            background: #ef4444;
        }

        .player-item .death-cause {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-left: 4px;
        }

        .player-item .identity-tag {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-left: 4px;
        }

        .btn {
            padding: 15px 40px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        .player-info {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="winner-card">
            <div class="winner-title">游戏结束</div>
            <div class="winner-name" id="winnerName">平民胜利</div>

            <div class="players-section">
                <div class="players-title">存活情况</div>
                <div class="player-list" id="playerList">加载中...</div>
            </div>

            <button class="btn btn-primary" id="confirmBtn">确定</button>
            <div class="player-info" id="playerInfo"></div>
        </div>
    </div>

    <script src="js/game-end.js"></script>
</body>
</html>
