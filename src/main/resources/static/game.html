<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谁是卧底 - 游戏大厅</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <div class="container">
        <div class="game-card">
            <div class="header">
                <button class="back-btn" onclick="goBack()">← 返回</button>
                <h1 class="title">游戏大厅</h1>
            </div>

            <div class="player-section" id="playerSection">
                <div class="avatar">
                    <span id="avatarIcon">😎</span>
                </div>
                <div class="player-name-section">
                    <label>我的昵称</label>
                    <input type="text" id="playerName" placeholder="请输入昵称" maxlength="12">
                    <button class="btn btn-small" onclick="registerPlayer()">注册</button>
                </div>
            </div>

            <div class="bind-code-section" id="bindCodeSection" style="display:none;">
                <div class="bind-code-card">
                    <h3>绑定码</h3>
                    <div class="bind-code" id="displayBindCode">--------</div>
                    <p class="bind-code-hint">请妥善保管此绑定码，下次可通过绑定码登录</p>
                </div>
                <button class="btn btn-small" onclick="showChangeName()">修改昵称</button>
            </div>

            <div class="divider"></div>

            <div class="room-section">
                <h2>房间操作</h2>

                <div class="room-card" onclick="createRoom()">
                    <div class="room-icon">➕</div>
                    <div class="room-info">
                        <h3>创建房间</h3>
                        <p>创建一个新游戏房间</p>
                    </div>
                </div>

                <div class="room-card" onclick="showJoinModal()">
                    <div class="room-icon">🚪</div>
                    <div class="room-info">
                        <h3>加入房间</h3>
                        <p>输入房间号加入游戏</p>
                    </div>
                </div>

                <div class="room-card" onclick="showBindModal()">
                    <div class="room-icon">🔗</div>
                    <div class="room-info">
                        <h3>绑定码登录</h3>
                        <p>使用绑定码恢复身份</p>
                    </div>
                </div>
            </div>

            <div class="user-info" id="savedNameDisplay"></div>
        </div>
    </div>

    <div class="modal" id="joinModal">
        <div class="modal-content">
            <span class="close" onclick="closeJoinModal()">&times;</span>
            <h2>加入房间</h2>
            <div class="join-form">
                <input type="text" id="roomCode" placeholder="请输入6位房间号" maxlength="6">
                <button class="btn btn-primary" onclick="joinRoom()">确认加入</button>
            </div>
        </div>
    </div>

    <div class="modal" id="bindModal">
        <div class="modal-content">
            <span class="close" onclick="closeBindModal()">&times;</span>
            <h2>绑定码登录</h2>
            <div class="join-form">
                <input type="text" id="bindCodeInput" placeholder="请输入4位绑定码" maxlength="4">
                <button class="btn btn-primary" onclick="bindPlayer()">确认绑定</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/game.js"></script>
</body>
</html>
